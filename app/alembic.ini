# Alembic config for the GeoSWMM Gateway.
#
# Most knobs are pulled from env vars at runtime by `migrations/env.py`, so
# this file is intentionally minimal. Don't put DATABASE_URL here — the env
# script reads it from the environment so secrets stay out of source.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url =

# Use a UTC timestamp + slug for new revision filenames.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC

# Migration files live in migrations/versions/.
version_locations = %(here)s/migrations/versions

[post_write_hooks]
# Run ruff over freshly generated migrations to keep the formatting tidy.
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
