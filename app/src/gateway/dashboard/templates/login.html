<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — GeoSWMM Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/static/dashboard.css?v={{ static_version }}">
</head>
<body>
  <main class="auth">
    <article class="auth__card">
      <div style="margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
        <span class="brand__mark" style="width: 24px; height: 24px;"></span>
        <span style="font-family: var(--font-display); font-size: 22px; color: var(--ink-700);">GeoSWMM Gateway</span>
      </div>
      <h2 style="font-family: var(--font-display); font-size: 24px; color: var(--ink-900); margin: 0; font-weight: 500;">Sign in</h2>
      <p class="muted" style="font-size: 13px; margin: 6px 0 24px;">Operators only. Console access is admin-gated.</p>

      {% if flash %}
        {% set kind = 'err' if flash.kind in ('error', 'err') else (flash.kind or 'info') %}
        <div class="flash flash--{{ kind }}">{{ flash.msg }}</div>
      {% endif %}

      <form method="post" action="/dashboard/login" class="col" style="gap: 14px;">
        <label class="field">
          <span class="field__label">Email</span>
          <input class="field__input" type="email" id="email" name="email" required autofocus placeholder="you@example.com">
        </label>
        <label class="field">
          <span class="field__label">Password</span>
          <input class="field__input" type="password" id="password" name="password" required>
        </label>
        <button class="btn btn--primary" style="padding: 10px 16px; justify-content: center;" type="submit">Sign in</button>
      </form>

      <div class="muted" style="font-size: 11.5px; text-align: center; margin-top: 22px; font-family: var(--font-mono);">
        GeoSWMM Gateway · admin console
      </div>
    </article>
  </main>
</body>
</html>
