{% extends "base.html" %}
{% block title %}New User — GeoSWMM Admin{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Create New User</h1>

  <div class="bg-white shadow rounded p-6">
    <form method="post" action="/dashboard/users" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email *</label>
        <input type="email" id="email" name="email" required
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">
          Password * <span class="text-gray-400 font-normal">(min 12 characters)</span>
        </label>
        <input type="password" id="password" name="password" required minlength="12"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="monthly_usd_cap">
          Monthly USD Cap
        </label>
        <input type="number" id="monthly_usd_cap" name="monthly_usd_cap" value="10.00"
               min="0" step="0.01"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <p class="text-xs text-gray-400 mt-1">Set to 0 for no cap (unlimited).</p>
      </div>

      <div class="flex items-center space-x-2">
        <input type="checkbox" id="is_admin" name="is_admin"
               class="rounded border-gray-300 text-blue-600">
        <label class="text-sm font-medium text-gray-700" for="is_admin">Grant admin access</label>
      </div>

      <div class="flex items-center space-x-3 pt-2">
        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded text-sm font-medium">
          Create User
        </button>
        <a href="/dashboard/users" class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
      </div>
    </form>
  </div>

  <p class="text-xs text-gray-400 mt-4">
    After creation, the access and refresh tokens are shown once. Copy them before leaving that page.
  </p>
</div>
{% endblock %}
