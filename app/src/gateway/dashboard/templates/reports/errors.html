{% extends "base.html" %}
{% from "partials/icons.html" import icon %}
{% block title %}Errors report — GeoSWMM Admin{% endblock %}
{% block content %}
{% set range = request.query_params.get('range', '7d') %}
<header class="page-header">
  <div>
    <h1>Errors</h1>
    <p class="subtitle">Non-2xx responses, grouped by bucket.</p>
  </div>
  <div class="page-header__actions">
    <div class="seg">
      <a class="seg__opt" href="?range=24h" data-active="{{ 'true' if range == '24h' else 'false' }}">24h</a>
      <a class="seg__opt" href="?range=7d"  data-active="{{ 'true' if range == '7d'  else 'false' }}">7d</a>
      <a class="seg__opt" href="?range=30d" data-active="{{ 'true' if range == '30d' else 'false' }}">30d</a>
    </div>
  </div>
</header>

<article class="card card--pad" style="margin-bottom: 22px;">
  <canvas id="errorsChart" height="80"></canvas>
</article>

<article class="card" id="errorsTable"></article>

<script>
const range = new URLSearchParams(location.search).get('range') || '7d';
(async () => {
  const resp = await fetch(`/dashboard/reports/errors.json?window=${range}`);
  const data = await resp.json();

  const buckets = {};
  for (const d of data) {
    if (!buckets[d.bucket]) buckets[d.bucket] = { errors: 0, total: 0 };
    buckets[d.bucket].errors += d.errors;
    buckets[d.bucket].total += d.total;
  }
  const labels = Object.keys(buckets).sort();
  const errVals = labels.map(l => buckets[l].errors);
  const totalVals = labels.map(l => buckets[l].total);

  new Chart(document.getElementById('errorsChart'), {
    type: 'line',
    data: {
      labels: labels.map(l => l.substring(0, 16)),
      datasets: [
        { label: 'Errors', data: errVals, borderColor: '#B0432C', backgroundColor: 'rgba(176, 67, 44, 0.1)', fill: true, tension: 0.3, borderWidth: 1.5 },
        { label: 'Total',  data: totalVals, borderColor: '#5B8266', backgroundColor: 'rgba(91, 130, 102, 0.06)', fill: true, tension: 0.3, borderWidth: 1.5 },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#3A332B' } } },
      scales: {
        y: { beginAtZero: true, grid: { color: '#EDE6DA' }, ticks: { color: '#6B6157', font: { family: 'JetBrains Mono', size: 10 } } },
        x: { grid: { display: false }, ticks: { color: '#6B6157', font: { family: 'JetBrains Mono', size: 10 } } }
      }
    }
  });

  if (data.length > 0) {
    const rows = data.map(d =>
      `<tr>
        <td class="col-mono muted">${d.bucket.substring(0, 16)}</td>
        <td class="col-num col-mono" style="color: var(--rust-500);">${d.errors}</td>
        <td class="col-num col-mono">${d.total}</td>
        <td class="muted">${d.error_code || "—"}</td>
      </tr>`
    ).join('');
    document.getElementById('errorsTable').innerHTML = `
      <table class="tbl">
        <thead><tr><th>Bucket</th><th class="col-num">Errors</th><th class="col-num">Total</th><th>Error code</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } else {
    document.getElementById('errorsTable').innerHTML = '<p class="tbl-empty">No errors in this period.</p>';
  }
})();
</script>
{% endblock %}
