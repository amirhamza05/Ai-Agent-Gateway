{% extends "base.html" %}
{% from "partials/icons.html" import icon %}
{% block title %}Users report — GeoSWMM Admin{% endblock %}
{% block content %}
{% set range = request.query_params.get('range', '30d') %}
<header class="page-header">
  <div>
    <h1>Users · activity</h1>
    <p class="subtitle">Top users by spend over the selected window.</p>
  </div>
  <div class="page-header__actions">
    <div class="seg">
      <a class="seg__opt" href="?range=7d"  data-active="{{ 'true' if range == '7d'  else 'false' }}">7d</a>
      <a class="seg__opt" href="?range=30d" data-active="{{ 'true' if range == '30d' else 'false' }}">30d</a>
    </div>
  </div>
</header>

<article class="card card--pad" style="margin-bottom: 22px;">
  <canvas id="usersChart" height="80"></canvas>
</article>

<article class="card" id="usersTable"></article>

<script>
const range = new URLSearchParams(location.search).get('range') || '30d';
(async () => {
  const resp = await fetch(`/dashboard/reports/users.json?window=${range}`);
  const data = await resp.json();
  const violet = '#6B5B95';

  const top10 = data.slice(0, 10);
  const ctx = document.getElementById('usersChart');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: top10.map(d => d.email),
      datasets: [{
        label: 'Spend USD',
        data: top10.map(d => d.spent_usd),
        backgroundColor: 'rgba(107, 91, 149, 0.7)',
        borderColor: violet,
        borderWidth: 1,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, title: { display: true, text: 'USD', color: '#6B6157', font: { family: 'JetBrains Mono', size: 11 } }, grid: { color: '#EDE6DA' }, ticks: { color: '#6B6157' } },
        y: { grid: { display: false }, ticks: { color: '#3A332B' } }
      }
    }
  });

  if (data.length > 0) {
    const rows = data.map(d =>
      `<tr>
        <td>${d.email}</td>
        <td class="col-num col-mono">$${d.spent_usd.toFixed(6)}</td>
        <td class="col-num col-mono muted">${d.request_count}</td>
      </tr>`
    ).join('');
    document.getElementById('usersTable').innerHTML = `
      <table class="tbl">
        <thead><tr><th>Email</th><th class="col-num">Spent USD</th><th class="col-num">Requests</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } else {
    document.getElementById('usersTable').innerHTML = '<p class="tbl-empty">No user activity for this period.</p>';
  }
})();
</script>
{% endblock %}
