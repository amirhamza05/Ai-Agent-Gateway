{% extends "base.html" %}
{% block title %}Cost Report — GeoSWMM Admin{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-2">Cost Report</h1>

<div class="flex items-center space-x-2 mb-6">
  <span class="text-sm text-gray-500">Range:</span>
  <a href="?range=24h" class="px-3 py-1 rounded text-sm {% if request.query_params.get('range', '7d') == '24h' %}bg-blue-600 text-white{% else %}bg-gray-200 hover:bg-gray-300 text-gray-700{% endif %}">24h</a>
  <a href="?range=7d" class="px-3 py-1 rounded text-sm {% if request.query_params.get('range', '7d') == '7d' %}bg-blue-600 text-white{% else %}bg-gray-200 hover:bg-gray-300 text-gray-700{% endif %}">7d</a>
  <a href="?range=30d" class="px-3 py-1 rounded text-sm {% if request.query_params.get('range', '7d') == '30d' %}bg-blue-600 text-white{% else %}bg-gray-200 hover:bg-gray-300 text-gray-700{% endif %}">30d</a>
</div>

<div class="bg-white shadow rounded p-6">
  <canvas id="costChart" height="80"></canvas>
</div>

<div id="costTable" class="mt-4 bg-white shadow rounded overflow-hidden"></div>

<script>
const range = new URLSearchParams(location.search).get('range') || '7d';
(async () => {
  const resp = await fetch(`/dashboard/reports/cost.json?window=${range}`);
  const data = await resp.json();

  const ctx = document.getElementById('costChart');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.day.substring(0, 13)),
      datasets: [{
        label: 'Cost USD',
        data: data.map(d => d.cost_usd),
        backgroundColor: 'rgba(37, 99, 235, 0.7)',
        borderColor: 'rgb(37, 99, 235)',
        borderWidth: 1,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, title: { display: true, text: 'USD' } } }
    }
  });

  // Table
  if (data.length > 0) {
    const rows = data.map(d =>
      `<tr class="hover:bg-gray-50 border-b border-gray-100">
        <td class="px-4 py-2 text-sm text-gray-600">${d.day}</td>
        <td class="px-4 py-2 text-sm text-right text-gray-800">$${d.cost_usd.toFixed(6)}</td>
      </tr>`
    ).join('');
    document.getElementById('costTable').innerHTML = `
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-xs text-gray-500 uppercase">
          <tr><th class="px-4 py-2 text-left">Period</th><th class="px-4 py-2 text-right">Cost USD</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }
})();
</script>
{% endblock %}
