{% extends "base.html" %}
{% from "partials/icons.html" import icon %}
{% block title %}Cost report — GeoSWMM Admin{% endblock %}
{% block content %}
{% set range = request.query_params.get('range', '7d') %}
<header class="page-header">
  <div>
    <h1>Cost</h1>
    <p class="subtitle">Spend by day across the gateway.</p>
  </div>
  <div class="page-header__actions">
    <div class="seg">
      <a class="seg__opt" href="?range=24h" data-active="{{ 'true' if range == '24h' else 'false' }}">24h</a>
      <a class="seg__opt" href="?range=7d"  data-active="{{ 'true' if range == '7d'  else 'false' }}">7d</a>
      <a class="seg__opt" href="?range=30d" data-active="{{ 'true' if range == '30d' else 'false' }}">30d</a>
    </div>
  </div>
</header>

<article class="card card--pad" style="margin-bottom: 22px;">
  <canvas id="costChart" height="80"></canvas>
</article>

<article class="card" id="costTable"></article>

<script>
const range = new URLSearchParams(location.search).get('range') || '7d';
(async () => {
  const resp = await fetch(`/dashboard/reports/cost.json?window=${range}`);
  const data = await resp.json();
  const ctx = document.getElementById('costChart');
  const accent = '#C26B4A';
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.day.substring(0, 13)),
      datasets: [{
        label: 'Cost USD',
        data: data.map(d => d.cost_usd),
        backgroundColor: 'rgba(194, 107, 74, 0.7)',
        borderColor: accent,
        borderWidth: 1,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, title: { display: true, text: 'USD', color: '#6B6157', font: { family: 'JetBrains Mono', size: 11 } }, grid: { color: '#EDE6DA' }, ticks: { color: '#6B6157', font: { family: 'JetBrains Mono', size: 10 } } },
        x: { grid: { display: false }, ticks: { color: '#6B6157', font: { family: 'JetBrains Mono', size: 10 } } }
      }
    }
  });

  if (data.length > 0) {
    const rows = data.map(d =>
      `<tr>
        <td class="col-mono muted">${d.day}</td>
        <td class="col-num col-mono">$${d.cost_usd.toFixed(6)}</td>
      </tr>`
    ).join('');
    document.getElementById('costTable').innerHTML = `
      <table class="tbl">
        <thead><tr><th>Period</th><th class="col-num">Cost USD</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } else {
    document.getElementById('costTable').innerHTML = '<p class="tbl-empty">No cost data for this period.</p>';
  }
})();
</script>
{% endblock %}
