{% extends "base.html" %}
{% from "partials/icons.html" import icon %}
{% block title %}Latency report — GeoSWMM Admin{% endblock %}
{% block content %}
{% set range = request.query_params.get('range', '24h') %}
<header class="page-header">
  <div>
    <h1>Latency</h1>
    <p class="subtitle">End-to-end response time, by endpoint.</p>
  </div>
  <div class="page-header__actions">
    <div class="seg">
      <a class="seg__opt" href="?range=24h" data-active="{{ 'true' if range == '24h' else 'false' }}">24h</a>
      <a class="seg__opt" href="?range=7d"  data-active="{{ 'true' if range == '7d'  else 'false' }}">7d</a>
      <a class="seg__opt" href="?range=30d" data-active="{{ 'true' if range == '30d' else 'false' }}">30d</a>
    </div>
  </div>
</header>

<article class="card card--pad" style="margin-bottom: 22px;">
  <canvas id="latencyChart" height="80"></canvas>
</article>

<article class="card" id="latencyTable"></article>

<script>
const range = new URLSearchParams(location.search).get('range') || '24h';
(async () => {
  const resp = await fetch(`/dashboard/reports/latency.json?window=${range}`);
  const data = await resp.json();

  new Chart(document.getElementById('latencyChart'), {
    type: 'bar',
    data: {
      labels: data.map(d => d.endpoint),
      datasets: [
        { label: 'p50', data: data.map(d => d.p50 || 0), backgroundColor: 'rgba(91, 130, 102, 0.75)', borderColor: '#5B8266', borderWidth: 1 },
        { label: 'p95', data: data.map(d => d.p95 || 0), backgroundColor: 'rgba(194, 138, 44, 0.75)', borderColor: '#C28A2C', borderWidth: 1 },
        { label: 'p99', data: data.map(d => d.p99 || 0), backgroundColor: 'rgba(176, 67, 44, 0.75)', borderColor: '#B0432C', borderWidth: 1 },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#3A332B' } } },
      scales: {
        y: { beginAtZero: true, title: { display: true, text: 'ms', color: '#6B6157', font: { family: 'JetBrains Mono', size: 11 } }, grid: { color: '#EDE6DA' }, ticks: { color: '#6B6157', font: { family: 'JetBrains Mono', size: 10 } } },
        x: { grid: { display: false }, ticks: { color: '#3A332B' } }
      }
    }
  });

  if (data.length > 0) {
    const rows = data.map(d =>
      `<tr>
        <td class="col-mono">${d.endpoint}</td>
        <td class="col-num col-mono">${d.p50 ? d.p50.toFixed(0) + ' ms' : '—'}</td>
        <td class="col-num col-mono">${d.p95 ? d.p95.toFixed(0) + ' ms' : '—'}</td>
        <td class="col-num col-mono">${d.p99 ? d.p99.toFixed(0) + ' ms' : '—'}</td>
        <td class="col-num col-mono muted">${d.n}</td>
      </tr>`
    ).join('');
    document.getElementById('latencyTable').innerHTML = `
      <table class="tbl">
        <thead><tr><th>Endpoint</th><th class="col-num">p50</th><th class="col-num">p95</th><th class="col-num">p99</th><th class="col-num">n</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } else {
    document.getElementById('latencyTable').innerHTML = '<p class="tbl-empty">No latency data for this period.</p>';
  }
})();
</script>
{% endblock %}
